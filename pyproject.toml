[tool.uv.workspace]
members = [
    "apps/mcp-server",
    "apps/doc-generator",
    "apps/annotator",
    "libs/logger",
    "libs/contracts",
]

[dependency-groups]
dev = [
    "ruff>=0.15.17",
    "pyrefly",
    "pytest>=8.0",
]

[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "PLC0415", # Enforce import-outside-top-level
    "SLF", # flake8-self (Private member access)
    "RUF", # Ruff-specific rules
]
ignore = [
    "E501",  # line too long (handled by formatting)
    "RUF001", # Ambiguous character in string
    "RUF002", # Ambiguous character in docstring
    "RUF003", # Ambiguous character in comment
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["SLF", "RUF", "PLC0415"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path", "fastapi.Body", "fastapi.Header", "fastapi.Cookie", "fastapi.File", "fastapi.Form", "fastapi.Security"]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"

[tool.pyrefly]
project-includes = [
    "**/*.py*",
    "**/*.ipynb",
]
project-excludes = [
    "**/__pyrefly_virtual__/**",
    "**/test_*.py",
    "**/conftest.py",
]
check-unannotated-defs = true
